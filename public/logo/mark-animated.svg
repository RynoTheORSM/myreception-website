<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 34" width="200" height="170">
  <style>
    /* Brand loop: typing dots, then the tick — "sorted". 5s cycle. */
    .d { animation: dsDots 5s infinite; }
    .t { stroke-dashoffset: 21; opacity: 0; animation: dsTick 5s infinite; }
    @keyframes dsDots {
      0%, 6% { opacity: 1; }
      10% { opacity: 0.25; }
      14%, 22% { opacity: 1; }
      26% { opacity: 0.25; }
      30%, 44% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes dsTick {
      0%, 48% { stroke-dashoffset: 21; opacity: 0; }
      50% { opacity: 1; }
      62% { stroke-dashoffset: 0; opacity: 1; }
      94% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
  </style>
  <rect x="2" y="3" width="36" height="24" rx="12" fill="#1B5689"></rect>
  <path d="M10 26 l-3.5 5.5 l9 -4 Z" fill="#1B5689"></path>
  <circle class="d" cx="13" cy="15" r="2.1" fill="#FFFFFF"></circle>
  <circle class="d" cx="20" cy="15" r="2.1" fill="#FFFFFF" style="animation-delay:0.15s"></circle>
  <circle class="d" cx="27" cy="15" r="2.1" fill="#FFFFFF" style="animation-delay:0.3s"></circle>
  <path class="t" d="M13 15.5 l4.5 4.3 l9.5 -10" fill="none" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="21"></path>
</svg>
